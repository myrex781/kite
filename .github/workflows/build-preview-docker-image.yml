name: Build and Push Preview Docker Image

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-ci-${{ github.event.workflow_run.head_branch || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # Only run if the triggering CI workflow concluded successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code (commit from CI run)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Install deps
        run: make deps

      - name: Generate tags
        id: tags
        run: |
          # Print debug information
          echo "Current commit: $(git rev-parse HEAD)"
          echo "All tags: $(git tag -l)"
          echo "Tags pointing to current commit: $(git tag -l --points-at HEAD)"
          
          # Get all tags pointing to the current commit
          TAGS=$(git tag -l --points-at HEAD)
          
          # Filter for version tags (v*.*.*)
          VERSION_TAGS=$(echo "$TAGS" | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$")
          
          if [ -n "$VERSION_TAGS" ]; then
            # If there are version tags, use the first one
            CI_TAG=$(echo "$VERSION_TAGS" | head -n 1)
            echo "Found version tag: $CI_TAG"
            echo "tags=ghcr.io/${{ github.repository_owner }}/kite:$CI_TAG" >> $GITHUB_OUTPUT
            echo "image_tag=$CI_TAG" >> $GITHUB_OUTPUT
          else
            # If no version tags, try to get the branch name
            CI_REF=$(git rev-parse --abbrev-ref HEAD || true)
            if [ -n "$CI_REF" ] && [ "$CI_REF" != "HEAD" ]; then
              # Use branch name
              echo "Using branch name: $CI_REF"
              echo "tags=ghcr.io/${{ github.repository_owner }}/kite:$CI_REF" >> $GITHUB_OUTPUT
              echo "image_tag=$CI_REF" >> $GITHUB_OUTPUT
            else
              # Default to main if no branch or tag
              echo "Using default tag: main"
              echo "tags=ghcr.io/${{ github.repository_owner }}/kite:main" >> $GITHUB_OUTPUT
              echo "image_tag=main" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build
        run: make cross-compile

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.binary
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: runnumber=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
